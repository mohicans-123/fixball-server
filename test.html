<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Fixball Sunucu Test</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1a1a1a;
      color: #eee;
      max-width: 700px;
      margin: 0 auto;
      padding: 20px;
    }
    h1 { color: #fff; }
    .panel {
      background: #2a2a2a;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 16px;
    }
    input, button {
      font-size: 14px;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #444;
    }
    input {
      background: #1a1a1a;
      color: #eee;
      width: 100%;
      margin-bottom: 10px;
      box-sizing: border-box;
    }
    button {
      background: #27ae60;
      color: #fff;
      border: none;
      cursor: pointer;
      margin-right: 8px;
    }
    button:hover { background: #229954; }
    button:disabled { background: #555; cursor: not-allowed; }
    button.danger { background: #e74c3c; }
    button.danger:hover { background: #c0392b; }
    .status {
      padding: 8px 12px;
      border-radius: 6px;
      display: inline-block;
      font-size: 13px;
      font-weight: bold;
    }
    .status.disconnected { background: #e74c3c; }
    .status.connecting { background: #f39c12; }
    .status.connected { background: #27ae60; }
    .log {
      background: #0d0d0d;
      padding: 12px;
      border-radius: 6px;
      height: 300px;
      overflow-y: auto;
      font-family: "Courier New", monospace;
      font-size: 12px;
      white-space: pre-wrap;
    }
    .log-in { color: #3498db; }
    .log-out { color: #e67e22; }
    .log-info { color: #888; }
    .log-error { color: #e74c3c; }
  </style>
</head>
<body>
  <h1>Fixball Sunucu Test</h1>

  <div class="panel">
    <label>Sunucu adresi:</label>
    <input type="text" id="url" value="ws://192.168.1.104:3000" />
    <button id="btnConnect">Bağlan</button>
    <button id="btnDisconnect" class="danger" disabled>Bağlantıyı Kes</button>
    <span class="status disconnected" id="status">Bağlı değil</span>
  </div>

  <div class="panel">
    <label>Mesaj gönder:</label>
    <input type="text" id="message" placeholder="Bir şeyler yaz, Enter'a bas" />
    <button id="btnSend" disabled>Gönder</button>
  </div>

  <div class="panel">
    <strong>Log:</strong>
    <div class="log" id="log"></div>
  </div>

  <script>
    let ws = null;
    const urlInput = document.getElementById('url');
    const messageInput = document.getElementById('message');
    const btnConnect = document.getElementById('btnConnect');
    const btnDisconnect = document.getElementById('btnDisconnect');
    const btnSend = document.getElementById('btnSend');
    const statusEl = document.getElementById('status');
    const logEl = document.getElementById('log');

    function log(text, cls) {
      const time = new Date().toLocaleTimeString();
      const line = document.createElement('div');
      line.className = 'log-' + (cls || 'info');
      line.textContent = `[${time}] ${text}`;
      logEl.appendChild(line);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function setStatus(state, text) {
      statusEl.className = 'status ' + state;
      statusEl.textContent = text;
    }

    btnConnect.onclick = () => {
      const url = urlInput.value.trim();
      if (!url) return;
      log('Bağlanıyor: ' + url, 'info');
      setStatus('connecting', 'Bağlanıyor...');
      btnConnect.disabled = true;

      try {
        ws = new WebSocket(url);

        ws.onopen = () => {
          log('Bağlandı!', 'info');
          setStatus('connected', 'Bağlı');
          btnDisconnect.disabled = false;
          btnSend.disabled = false;
        };

        ws.onmessage = (event) => {
          log('<= ' + event.data, 'in');
        };

        ws.onclose = () => {
          log('Bağlantı kapandı.', 'info');
          setStatus('disconnected', 'Bağlı değil');
          btnConnect.disabled = false;
          btnDisconnect.disabled = true;
          btnSend.disabled = true;
          ws = null;
        };

        ws.onerror = (err) => {
          log('Hata: bağlantı kurulamadı', 'error');
        };
      } catch (e) {
        log('Hata: ' + e.message, 'error');
        setStatus('disconnected', 'Bağlı değil');
        btnConnect.disabled = false;
      }
    };

    btnDisconnect.onclick = () => {
      if (ws) ws.close();
    };

    btnSend.onclick = () => {
      const msg = messageInput.value;
      if (!msg || !ws) return;
      ws.send(msg);
      log('=> ' + msg, 'out');
      messageInput.value = '';
    };

    messageInput.onkeydown = (e) => {
      if (e.key === 'Enter') btnSend.click();
    };
  </script>
</body>
</html>
